<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Балалар ойыны 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--shadow-card:0 8px 24px rgba(0,0,0,.18);--radius-card:20px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;
  background:linear-gradient(170deg,#6EC6F5 0%,#B8E4FF 40%,#D4F5C4 100%);
  background-attachment:fixed;touch-action:pan-y}
.clouds{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cloud{position:absolute;background:white;border-radius:60px;opacity:.88}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%}
.cloud.c1{width:130px;height:42px;top:7%;animation:drift 26s linear infinite}
.cloud.c1::before{width:68px;height:68px;top:-34px;left:18px}
.cloud.c1::after{width:46px;height:46px;top:-22px;left:58px}
.cloud.c2{width:96px;height:30px;top:20%;animation:drift 40s linear infinite;animation-delay:-14s;opacity:.7}
.cloud.c2::before{width:48px;height:48px;top:-24px;left:14px}
.cloud.c3{width:160px;height:48px;top:4%;animation:drift 52s linear infinite;animation-delay:-28s;opacity:.6}
.cloud.c3::before{width:76px;height:76px;top:-38px;left:24px}
.cloud.c3::after{width:54px;height:54px;top:-26px;left:72px}
@keyframes drift{from{transform:translateX(-220px)}to{transform:translateX(110vw)}}
.sun{position:fixed;top:18px;right:22px;font-size:54px;z-index:2;
  animation:sunpulse 4s ease-in-out infinite;filter:drop-shadow(0 0 12px #FFD60088)}
@keyframes sunpulse{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.1) rotate(6deg)}}
.wrapper{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:14px 10px 80px}
.header{text-align:center;padding:10px 0 6px}
.header h1{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,8vw,3.2rem);
  color:white;text-shadow:3px 4px 0 #2d7a20,0 0 30px rgba(255,255,255,.4);letter-spacing:1px}
.header p{font-size:1rem;color:rgba(255,255,255,.92);font-weight:700;margin-top:3px;
  text-shadow:1px 2px 0 rgba(0,0,0,.2)}
.mode-row{display:flex;gap:10px;justify-content:center;margin:12px 0 8px}
.mode-btn{padding:10px 22px;border-radius:999px;border:none;
  font-family:'Fredoka One',cursive;font-size:1.05rem;cursor:pointer;
  transition:all .2s;user-select:none;position:relative;top:0;box-shadow:0 5px 0 rgba(0,0,0,.2)}
.mode-btn:active{top:4px;box-shadow:0 1px 0 rgba(0,0,0,.15)}
.mode-btn.am{background:linear-gradient(145deg,#fff,#f0f0f0);color:#2d5a27}
.mode-btn.im{background:rgba(255,255,255,.35);color:white;box-shadow:0 5px 0 rgba(0,0,0,.12)}
.mode-panel{display:none}.mode-panel.active{display:block}
.tabs{display:flex;gap:8px;justify-content:center;margin:10px 0 14px;flex-wrap:wrap}
.tab{padding:9px 20px;border-radius:999px;border:none;font-family:'Fredoka One',cursive;
  font-size:1rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 0 rgba(0,0,0,.18);
  position:relative;top:0;user-select:none}
.tab:active{top:3px;box-shadow:0 1px 0 rgba(0,0,0,.12)}
.tab.animals{background:linear-gradient(135deg,#FF9A3C,#FF6B00);color:white}
.tab.colors{background:linear-gradient(135deg,#A855F7,#7C3AED);color:white}
.tab.numbers{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:white}
.tab.inactive{background:rgba(255,255,255,.5);color:#555;box-shadow:0 4px 0 rgba(0,0,0,.08)}
.match-tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.mtab{padding:9px 16px;border-radius:999px;border:none;font-family:'Fredoka One',cursive;
  font-size:.95rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 0 rgba(0,0,0,.15);
  position:relative;top:0;user-select:none}
.mtab:active{top:3px;box-shadow:0 1px 0 rgba(0,0,0,.1)}
.mtab.act-colors{background:linear-gradient(135deg,#A855F7,#7C3AED);color:white}
.mtab.act-shapes{background:linear-gradient(135deg,#0EA5E9,#0369A1);color:white}
.mtab.act-animals{background:linear-gradient(135deg,#F97316,#C2410C);color:white}
.mtab.minact{background:rgba(255,255,255,.45);color:#444;box-shadow:0 4px 0 rgba(0,0,0,.08)}
.bubble-wrap{text-align:center;margin-bottom:14px;min-height:64px}
.bubble{display:inline-block;background:white;border-radius:20px;padding:11px 22px;
  font-size:1.15rem;font-weight:800;color:#1a1a1a;box-shadow:0 6px 24px rgba(0,0,0,.15);
  position:relative;animation:bobble .35s ease;max-width:92%}
.bubble::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:white}
@keyframes bobble{0%{transform:scale(.82);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.section{display:none}.section.active{display:block}
.animal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.animal-card{background:white;border-radius:var(--radius-card);overflow:hidden;
  box-shadow:var(--shadow-card);cursor:pointer;transition:transform .15s;user-select:none}
.animal-card:active{transform:scale(.92)}
.animal-card.pop{animation:cpop .38s ease forwards}
@keyframes cpop{0%{transform:scale(1)}35%{transform:scale(1.14) rotate(-2deg)}65%{transform:scale(.96) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
.animal-img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:#e8f4f0}
.animal-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.animal-card:active .animal-img-wrap img{transform:scale(1.1)}
.animal-info{padding:7px 8px 9px;text-align:center;background:white}
.animal-kaz{font-family:'Fredoka One',cursive;font-size:clamp(.9rem,2.8vw,1.1rem);color:#222}
.animal-sound{font-size:.72rem;color:#999;font-weight:700;margin-top:1px}
.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.color-card{border-radius:var(--radius-card);aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-card);
  transition:transform .15s;user-select:none;padding:8px}
.color-card:active{transform:scale(.91)}
.color-card.pop{animation:cpop .38s ease}
.color-name{font-family:'Fredoka One',cursive;font-size:clamp(.95rem,3.5vw,1.3rem);
  text-align:center;line-height:1.2;text-shadow:0 2px 6px rgba(0,0,0,.22)}
.color-example{margin-top:7px;font-size:1.9rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}
.number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.num-card{background:white;border-radius:16px;padding:9px 3px 7px;text-align:center;
  cursor:pointer;box-shadow:var(--shadow-card);transition:transform .15s;user-select:none}
.num-card:active{transform:scale(.9)}
.num-card.pop{animation:cpop .38s ease}
.num-big{font-family:'Fredoka One',cursive;font-size:clamp(1.55rem,4.5vw,2.1rem);line-height:1}
.num-dots{font-size:clamp(.5rem,1.8vw,.65rem);line-height:1.2;color:#666;min-height:20px;word-break:break-all;padding:2px 2px 0}
.num-kaz{font-size:clamp(.58rem,1.8vw,.72rem);color:#aaa;font-weight:700;margin-top:2px}

/* ══ MATCH ══ */
.match-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.match-score{background:white;border-radius:16px;padding:7px 18px;
  font-family:'Fredoka One',cursive;font-size:1.05rem;color:#2d5a27;
  box-shadow:0 4px 14px rgba(0,0,0,.14)}
.match-restart{background:rgba(255,255,255,.7);border-radius:999px;border:none;
  padding:7px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;
  cursor:pointer;color:#444;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.match-restart:active{transform:scale(.95)}
.match-instr{text-align:center;font-size:.92rem;font-weight:800;color:white;
  text-shadow:1px 2px 0 rgba(0,0,0,.2);margin-bottom:12px;min-height:22px}

/* ZONES */
.zones-grid{display:grid;gap:8px;margin-bottom:10px}
.zones-grid.cols3{grid-template-columns:repeat(3,1fr)}
.zones-grid.cols4{grid-template-columns:repeat(4,1fr)}
.zone{border-radius:16px;min-height:78px;border:3px dashed;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:transform .2s,filter .2s,border-color .2s,background .2s;
  position:relative;padding:6px 4px 20px;cursor:default}
.zone.drag-over{transform:scale(1.07);filter:brightness(1.12);border-style:solid}
.zone.zcorrect{animation:zpop .45s ease;border-style:solid}
@keyframes zpop{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}
.zone.wrong-shake{animation:shake .32s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}
.zone-label{font-family:'Fredoka One',cursive;font-size:.65rem;
  position:absolute;bottom:3px;left:0;right:0;text-align:center;line-height:1}
.zone-circle{width:46px;height:46px;border-radius:50%;transition:all .3s}
.zone-shape svg{transition:all .3s}
.zone-emoji{font-size:2.4rem;line-height:1;transition:all .3s;display:block}
.zone-photo{width:54px;height:54px;border-radius:12px;object-fit:cover;
  opacity:.55;filter:grayscale(.35);transition:all .3s;display:block}

/* DRAGGABLE CARDS */
.mcards-grid{display:grid;gap:8px}
.mcards-grid.cols3{grid-template-columns:repeat(3,1fr)}
.mcards-grid.cols4{grid-template-columns:repeat(4,1fr)}
.mcard{border-radius:16px;min-height:78px;cursor:grab;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--shadow-card);transition:transform .15s,box-shadow .15s,opacity .35s;
  user-select:none;padding:5px 4px;border:3px solid transparent;
  position:relative;overflow:hidden;touch-action:none}
.mcard::after{content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.04) 60%);
  pointer-events:none}
.mcard.dragging{opacity:.25;transform:scale(.95)}
.mcard.mmatched{opacity:0;transform:scale(.4);pointer-events:none;transition:all .4s ease}
.mcard-lbl{font-family:'Fredoka One',cursive;font-size:.68rem;margin-top:3px;
  text-shadow:0 1px 4px rgba(0,0,0,.3);text-align:center;line-height:1.1;
  color:rgba(255,255,255,.95);pointer-events:none}
.mcard-icon{font-size:1.5rem;filter:drop-shadow(0 1px 4px rgba(0,0,0,.2));pointer-events:none}
.mcard-shape{pointer-events:none}
.mcard-photo{width:52px;height:52px;border-radius:10px;object-fit:cover;
  display:block;pointer-events:none}

/* GHOST (drag clone) */
.ghost-card{position:fixed;pointer-events:none;z-index:9999;border-radius:16px;
  box-shadow:0 18px 48px rgba(0,0,0,.38);opacity:.9;
  transform:scale(1.1) rotate(3deg);transition:none;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center}
.ghost-card::after{content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.04) 60%);
  pointer-events:none}

/* WIN */
.win-overlay{display:none;text-align:center;padding:2.5rem 1rem}
.win-emoji{font-size:80px;animation:bounce 1.1s ease-in-out infinite;display:block}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}
.win-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:white;
  text-shadow:3px 4px 0 #2d7a20;margin:14px 0 6px}
.win-sub{font-size:1.05rem;color:rgba(255,255,255,.9);font-weight:700;
  margin-bottom:22px;text-shadow:1px 2px 0 rgba(0,0,0,.15)}
.win-btn{background:white;color:#2d5a27;border:none;border-radius:999px;
  padding:14px 40px;font-family:'Fredoka One',cursive;font-size:1.3rem;
  cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.16)}
.win-btn:active{transform:scale(.97)}
.star-burst{position:fixed;pointer-events:none;z-index:9999;font-size:28px;animation:sfx .85s ease forwards}
@keyframes sfx{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:scale(1.7) translate(var(--tx),var(--ty))}}
.grass-footer{position:fixed;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(180deg,#5BBF6A,#3d9e4f);z-index:3;
  border-radius:60% 60% 0 0/22px 22px 0 0;box-shadow:0 -2px 12px rgba(0,0,0,.1)}
@media(max-width:400px){.animal-grid,.color-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="clouds">
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
</div>
<div class="sun">☀️</div>
<div class="wrapper">
  <div class="header">
    <h1>🌟 Балалар ойыны</h1>
    <p>Суретті бас — үйрен!</p>
  </div>
  <div class="mode-row">
    <button class="mode-btn am" onclick="switchMode('learn',this)">📚 Үйрену</button>
    <button class="mode-btn im" onclick="switchMode('match',this)">🎨 Жұптастыру</button>
  </div>

  <!-- LEARN -->
  <div class="mode-panel active" id="mode-learn">
    <div class="tabs">
      <button class="tab animals" onclick="showSection('animals',this)">🐾 Жануарлар</button>
      <button class="tab colors inactive" onclick="showSection('clr',this)">🎨 Түстер</button>
      <button class="tab numbers inactive" onclick="showSection('nums',this)">🔢 Сандар</button>
    </div>
    <div class="bubble-wrap"><div class="bubble" id="bubble">Суретті бас! 👇</div></div>
    <div class="section active" id="animals"><div class="animal-grid" id="animal-grid"></div></div>
    <div class="section" id="clr"><div class="color-grid" id="color-grid"></div></div>
    <div class="section" id="nums"><div class="number-grid" id="number-grid"></div></div>
  </div>

  <!-- MATCH -->
  <div class="mode-panel" id="mode-match">
    <div class="match-tabs">
      <button class="mtab act-colors" id="mtab-colors" onclick="switchGame('colors',this)">🎨 Түстер</button>
      <button class="mtab minact" id="mtab-shapes" onclick="switchGame('shapes',this)">⬡ Фигуралар</button>
      <button class="mtab minact" id="mtab-animals" onclick="switchGame('animals',this)">🐾 Жануарлар</button>
    </div>
    <div id="match-game">
      <div class="match-topbar">
        <div class="match-score" id="mscore">Жұп: 0 / ?</div>
        <button class="match-restart" onclick="restartMatch()">↺ Жаңа ойын</button>
      </div>
      <div class="match-instr" id="minstr">Картаны сүйреп апар! 👆</div>
      <div class="zones-grid cols4" id="zones-grid"></div>
      <div class="mcards-grid cols4" id="mcards-grid"></div>
    </div>
    <div class="win-overlay" id="win-overlay">
      <span class="win-emoji">🏆</span>
      <div class="win-title" id="win-title">Керемет!</div>
      <div class="win-sub" id="win-sub">Барлығын тапты!</div>
      <button class="win-btn" onclick="restartMatch()">▶ Тағы ойна!</button>
    </div>
  </div>
</div>
<div class="grass-footer"></div>

<script>
// ── SPEECH ────────────────────────────────────────────────────────────────
let kkVoice=null;
function initVoices(){
  const vs=window.speechSynthesis.getVoices();
  kkVoice=vs.find(v=>v.lang.startsWith('kk'))||vs.find(v=>v.name.includes('Aigul'))||vs.find(v=>v.lang.startsWith('ru'))||null;
}
if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=initVoices;setTimeout(initVoices,400);}
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='kk-KZ';u.rate=0.82;u.pitch=1.05;if(kkVoice)u.voice=kkVoice;
  window.speechSynthesis.speak(u);
}
function speakSeq(a,b){speak(a);setTimeout(()=>speak(b),950);}

// ── UTILS ─────────────────────────────────────────────────────────────────
function popEl(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true});}
function burst(cx,cy,n=5){
  for(let i=0;i<n;i++){
    const s=document.createElement('div');s.className='star-burst';
    s.textContent=['⭐','🌟','✨','💫','🎉','🌈'][Math.floor(Math.random()*6)];
    const angle=(i/n)*360+Math.random()*35,dist=55+Math.random()*60;
    s.style.setProperty('--tx',Math.cos(angle*Math.PI/180)*dist+'px');
    s.style.setProperty('--ty',Math.sin(angle*Math.PI/180)*dist+'px');
    s.style.left=(cx-14)+'px';s.style.top=(cy-14)+'px';
    document.body.appendChild(s);s.addEventListener('animationend',()=>s.remove());
  }
}
function burstEl(el,n=6){const r=el.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2,n);}
function setBubble(t){const b=document.getElementById('bubble');b.style.animation='none';b.offsetHeight;b.style.animation='';b.textContent=t;}
function hexToRgba(hex,a){
  const h=hex.replace('#','');
  const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}
function shuffle(a){return [...a].sort(()=>Math.random()-.5);}

function switchMode(m,btn){
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('mode-'+m).classList.add('active');
  document.querySelectorAll('.mode-btn').forEach(b=>{b.classList.remove('am');b.classList.add('im')});
  btn.classList.add('am');btn.classList.remove('im');
}

// ══ LEARN ════════════════════════════════════════════════════════════════
const learnAnimals=[
  {kaz:'Мысық',  sound:'Мияу мияу',     soundShow:'Мияу-мияу!',  emoji:'🐱',photo:'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&q=80'},
  {kaz:'Ит',     sound:'Ав ав ав',       soundShow:'Ав-ав!',       emoji:'🐶',photo:'https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=400&q=80'},
  {kaz:'Сиыр',   sound:'Мөө мөө',        soundShow:'Мөөөөө!',      emoji:'🐄',photo:'https://images.unsplash.com/photo-1546445317-29f4545e9d53?w=400&q=80'},
  {kaz:'Қой',    sound:'Ма ма ма',       soundShow:'Мәәәәәәәәә!',  emoji:'🐑',photo:'https://images.unsplash.com/photo-1484557985045-edf25e08da73?w=400&q=80'},
  {kaz:'Жылқы',  sound:'Іһіһіһіһі',    soundShow:'Иіһіһіһі!',   emoji:'🐴',photo:'https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?w=400&q=80'},
  {kaz:'Тауық',  sound:'Ко ко ко',       soundShow:'Қытыр-қытыр!',emoji:'🐔',photo:'https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?w=400&q=80'},
  
];
const learnColors=[
  {kaz:'Қызыл',bg:'#E63946',text:'#fff',ex:''},{kaz:'Көк',bg:'#4A90D9',text:'#fff',ex:''},
  {kaz:'Жасыл',bg:'#4CAF50',text:'#fff',ex:''},{kaz:'Сары',bg:'#FFD600',text:'#5a4000',ex:''},
  {kaz:'Қызғылт',bg:'#F06292',text:'#fff',ex:''},{kaz:'Қара',bg:'#333',text:'#fff',ex:''},
  {kaz:'Ақ',bg:'#ffffff',text:'#555',ex:''},{kaz:'Күлгін',bg:'#9C27B0',text:'#fff',ex:''},
  {kaz:'Қызғылт сары',bg:'#FF7043',text:'#fff',ex:''},
];
const nums=[{n:1,kaz:'Бір',dots:'●'},{n:2,kaz:'Екі',dots:'●●'},{n:3,kaz:'Үш',dots:'●●●'},
  {n:4,kaz:'Төрт',dots:'●●●●'},{n:5,kaz:'Бес',dots:'●●●●●'},{n:6,kaz:'Алты',dots:'●●●●●●'},
  {n:7,kaz:'Жеті',dots:'●●●●●●●'},{n:8,kaz:'Сегіз',dots:'●●●●●●●●'},
  {n:9,kaz:'Тоғыз',dots:'●●●●●●●●●'},{n:10,kaz:'Он',dots:'●●●●●●●●●●'}];
const nColors=['#FF6B6B','#FF9F43','#FFD93D','#6BCB77','#4ECDC4','#45B7D1','#A55EEA','#F06292','#26de81','#45aaf2'];

const ag=document.getElementById('animal-grid');
learnAnimals.forEach(a=>{
  const d=document.createElement('div');d.className='animal-card';
  d.innerHTML=`<div class="animal-img-wrap"><img src="${a.photo}" alt="${a.kaz}" loading="lazy"></div>

function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));

// ══ SVG SHAPES ═══════════════════════════════════════════════════════════
function svgShape(type,fill,size=42,op=1){
  const s=size,h=s/2,c=`fill="${fill}" opacity="${op}"`;
  const P={
    circle:`<circle cx="${h}" cy="${h}" r="${h-2}" ${c}/>`,
    square:`<rect x="3" y="3" width="${s-6}" height="${s-6}" rx="5" ${c}/>`,
    triangle:`<polygon points="${h},3 ${s-3},${s-3} 3,${s-3}" ${c}/>`,
    rectangle:`<rect x="2" y="${h-9}" width="${s-4}" height="18" rx="4" ${c}/>`,
    star:`<polygon points="${h},2 ${h+7},${h-5} ${s-2},${h-5} ${h+11},${h+4} ${h+8},${s-2} ${h},${h+9} ${h-8},${s-2} ${h-11},${h+4} 2,${h-5} ${h-7},${h-5}" ${c}/>`,
    heart:`<path d="M${h} ${s-4}C${h-2} ${s-7} 3 ${h+5} 3 ${h-1}A${h-5},${h-5} 0 0 1 ${h},${h+2}A${h-5},${h-5} 0 0 1 ${s-3},${h-1}C${s-3} ${h+5} ${h+2} ${s-7} ${h} ${s-4}z" ${c}/>`,
    diamond:`<polygon points="${h},3 ${s-3},${h} ${h},${s-3} 3,${h}" ${c}/>`,
    oval:`<ellipse cx="${h}" cy="${h}" rx="${h-2}" ry="${Math.round(h/2)-1}" ${c}/>`,
    pentagon:`<polygon points="${h},3 ${s-5},${h-5} ${s-7},${s-4} ${h+7},${s-4} 5,${h-5}" ${c}/>`,
  };
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${s} ${s}">${P[type]||P.circle}</svg>`;
}

// ══ MATCH ENGINE ══════════════════════════════════════════════════════════
let curGame='colors', mMatched=0, matchedIds=new Set();

function switchGame(type,btn){
  curGame=type;
  document.querySelectorAll('.mtab').forEach(t=>{t.classList.remove('act-colors','act-shapes','act-animals');t.classList.add('minact')});
  btn.classList.remove('minact');btn.classList.add('act-'+type);
  restartMatch();
}

function restartMatch(){
  mMatched=0; matchedIds=new Set();
  stopDrag();
  const G=GAMES[curGame];
  document.getElementById('match-game').style.display='block';
  document.getElementById('win-overlay').style.display='none';
  document.getElementById('mscore').textContent=`Жұп: 0 / ${G.total}`;
  document.getElementById('minstr').textContent=G.instr;
  document.getElementById('zones-grid').className=`zones-grid cols${G.cols}`;
  document.getElementById('mcards-grid').className=`mcards-grid cols${G.cols}`;
  buildZones(); buildMCards();
}

function buildZones(){
  const G=GAMES[curGame], g=document.getElementById('zones-grid'); g.innerHTML='';
  shuffle(G.items).forEach(c=>{
    const d=document.createElement('div');
    d.className='zone'; d.id='zone-'+c.id;
    G.styleZone(d,c);
    d.innerHTML=G.buildZone(c);
    g.appendChild(d);
  });
}

function buildMCards(){
  const G=GAMES[curGame], g=document.getElementById('mcards-grid'); g.innerHTML='';
  shuffle(G.items).forEach(c=>{
    const d=document.createElement('div');
    d.className='mcard'; d.id='mcard-'+c.id;
    G.styleCard(d,c);
    d.innerHTML=G.buildCard(c);
    // DRAG events
    d.addEventListener('pointerdown', e=>onCardDown(e,c.id,d));
    g.appendChild(d);
  });
}

// ══ DRAG & DROP ═══════════════════════════════════════════════════════════
let dragId=null, ghost=null, hoverZone=null;

function onCardDown(e, id, cardEl){
  if(cardEl.classList.contains('mmatched')) return;
  e.preventDefault();
  dragId=id;
  const G=GAMES[curGame];
  const item=G.items.find(c=>c.id===id);
  speak(item.kaz);
  if(item.sound) setTimeout(()=>speak(item.sound),900);

  // Ghost
  const rect=cardEl.getBoundingClientRect();
  ghost=cardEl.cloneNode(true);
  ghost.className='ghost-card';
  ghost.style.width=rect.width+'px';
  ghost.style.height=rect.height+'px';
  ghost.style.background=cardEl.style.background;
  ghost.style.boxShadow=cardEl.style.boxShadow;
  posGhost(e.clientX, e.clientY, rect.width, rect.height);
  document.body.appendChild(ghost);
  cardEl.classList.add('dragging');
  document.getElementById('minstr').textContent='Жоғарыдағы жұбына сүйреп апар! ☝️';

  document.addEventListener('pointermove', onPtrMove, {passive:false});
  document.addEventListener('pointerup', onPtrUp);
  document.addEventListener('pointercancel', onPtrUp);
}

function posGhost(x,y,w,h){
  if(!ghost)return;
  ghost.style.left=(x-w/2)+'px';
  ghost.style.top=(y-h/2)+'px';
}

function onPtrMove(e){
  if(!ghost)return;
  e.preventDefault();
  posGhost(e.clientX,e.clientY,parseFloat(ghost.style.width),parseFloat(ghost.style.height));
  // Find zone under pointer
  ghost.style.visibility='hidden';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  ghost.style.visibility='visible';
  const zone=el?.closest('.zone');
  if(hoverZone && hoverZone!==zone){
    if(!matchedIds.has(hoverZone.id.replace('zone-','')))
      hoverZone.classList.remove('drag-over');
  }
  if(zone && !matchedIds.has(zone.id.replace('zone-',''))){
    zone.classList.add('drag-over');
    hoverZone=zone;
  } else if(!zone){
    hoverZone=null;
  }
}

function onPtrUp(e){
  if(!ghost){cleanDrag();return;}
  ghost.style.visibility='hidden';
  const el=document.elementFromPoint(e.clientX,e.clientY);
  ghost.remove(); ghost=null;
  if(hoverZone){hoverZone.classList.remove('drag-over');hoverZone=null;}
  const zone=el?.closest('.zone');
  const cid=dragId; cleanDrag();
  if(zone && cid){
    const zid=zone.id.replace('zone-','');
    if(cid===zid) doMatch(zid,zone);
    else doWrong(zone);
  }
}

function stopDrag(){
  if(ghost){ghost.remove();ghost=null;}
  if(hoverZone){hoverZone.classList.remove('drag-over');hoverZone=null;}
  cleanDrag();
}

function cleanDrag(){
  if(dragId){
    const c=document.getElementById('mcard-'+dragId);
    if(c)c.classList.remove('dragging');
    dragId=null;
  }
  document.removeEventListener('pointermove',onPtrMove);
  document.removeEventListener('pointerup',onPtrUp);
  document.removeEventListener('pointercancel',onPtrUp);
}

function doMatch(id,zoneEl){
  const G=GAMES[curGame];
  const item=G.items.find(c=>c.id===id);
  const cardEl=document.getElementById('mcard-'+id);
  const zc=document.getElementById('zc-'+id);
  matchedIds.add(id);
  zoneEl.classList.add('zcorrect');
  G.correctZone(zoneEl,zc,item);
  cardEl.classList.add('mmatched');
  burstEl(zoneEl,8);
  speak(item.kaz);
  mMatched++;
  document.getElementById('mscore').textContent=`Жұп: ${mMatched} / ${G.total}`;
  if(mMatched===G.total){
    setTimeout(()=>{
      document.getElementById('match-game').style.display='none';
      document.getElementById('win-title').textContent=G.winTitle;
      document.getElementById('win-sub').textContent=G.winSub;
      document.getElementById('win-overlay').style.display='block';
      for(let i=0;i<22;i++) setTimeout(()=>burst(60+Math.random()*(window.innerWidth-120),60+Math.random()*(window.innerHeight-120),4),i*80);
    },700);
  } else {
    document.getElementById('minstr').textContent=`✅ Дұрыс! (${mMatched}/${G.total}) Келесіні сүйре!`;
  }
}

function doWrong(zoneEl){
  zoneEl.classList.remove('wrong-shake');void zoneEl.offsetWidth;zoneEl.classList.add('wrong-shake');
  zoneEl.addEventListener('animationend',()=>zoneEl.classList.remove('wrong-shake'),{once:true});
  document.getElementById('minstr').textContent='❌ Жоқ! Тағы көр!';
  setTimeout(()=>document.getElementById('minstr').textContent=GAMES[curGame].instr,1000);
}

restartMatch();
