<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Балалар ойыны 🌟</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --sky1:#6EC6F5;--sky2:#B8E4FF;--grass:#5BBF6A;
  --shadow-card:0 8px 24px rgba(0,0,0,.18);
  --shadow-card-hover:0 14px 36px rgba(0,0,0,.24);
  --radius-card:22px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;
  background:linear-gradient(170deg,#6EC6F5 0%,#B8E4FF 40%,#D4F5C4 100%);
  background-attachment:fixed}

/* CLOUDS */
.clouds{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.cloud{position:absolute;background:white;border-radius:60px;opacity:.88}
.cloud::before,.cloud::after{content:'';position:absolute;background:white;border-radius:50%}
.cloud.c1{width:130px;height:42px;top:7%;animation:drift 26s linear infinite}
.cloud.c1::before{width:68px;height:68px;top:-34px;left:18px}
.cloud.c1::after{width:46px;height:46px;top:-22px;left:58px}
.cloud.c2{width:96px;height:30px;top:20%;animation:drift 40s linear infinite;animation-delay:-14s;opacity:.7}
.cloud.c2::before{width:48px;height:48px;top:-24px;left:14px}
.cloud.c3{width:160px;height:48px;top:4%;animation:drift 52s linear infinite;animation-delay:-28s;opacity:.6}
.cloud.c3::before{width:76px;height:76px;top:-38px;left:24px}
.cloud.c3::after{width:54px;height:54px;top:-26px;left:72px}
@keyframes drift{from{transform:translateX(-220px)}to{transform:translateX(110vw)}}

.sun{position:fixed;top:18px;right:22px;font-size:54px;z-index:2;
  animation:sunpulse 4s ease-in-out infinite;filter:drop-shadow(0 0 12px #FFD60088)}
@keyframes sunpulse{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.1) rotate(6deg)}}

.wrapper{position:relative;z-index:2;max-width:680px;margin:0 auto;padding:14px 10px 80px}

/* HEADER */
.header{text-align:center;padding:10px 0 6px}
.header h1{font-family:'Fredoka One',cursive;font-size:clamp(2.2rem,8vw,3.2rem);
  color:white;text-shadow:3px 4px 0 #2d7a20,0 0 30px rgba(255,255,255,.4);letter-spacing:1px}
.header p{font-size:1rem;color:rgba(255,255,255,.92);font-weight:700;margin-top:3px;
  text-shadow:1px 2px 0 rgba(0,0,0,.2)}

/* MODE SWITCHER */
.mode-row{display:flex;gap:10px;justify-content:center;margin:12px 0 8px}
.mode-btn{padding:10px 22px;border-radius:999px;border:none;
  font-family:'Fredoka One',cursive;font-size:1.05rem;cursor:pointer;
  transition:all .2s;user-select:none;position:relative;top:0;
  box-shadow:0 5px 0 rgba(0,0,0,.2)}
.mode-btn:active{top:4px;box-shadow:0 1px 0 rgba(0,0,0,.15)}
.mode-btn.am{background:linear-gradient(145deg,#fff,#f0f0f0);color:#2d5a27}
.mode-btn.im{background:rgba(255,255,255,.35);color:white;box-shadow:0 5px 0 rgba(0,0,0,.12)}
.mode-panel{display:none}.mode-panel.active{display:block}

/* LEARN TABS */
.tabs{display:flex;gap:8px;justify-content:center;margin:10px 0 14px;flex-wrap:wrap}
.tab{padding:9px 20px;border-radius:999px;border:none;
  font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;
  transition:all .2s;box-shadow:0 4px 0 rgba(0,0,0,.18);position:relative;top:0;user-select:none}
.tab:active{top:3px;box-shadow:0 1px 0 rgba(0,0,0,.12)}
.tab.animals{background:linear-gradient(135deg,#FF9A3C,#FF6B00);color:white}
.tab.colors{background:linear-gradient(135deg,#A855F7,#7C3AED);color:white}
.tab.numbers{background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:white}
.tab.inactive{background:rgba(255,255,255,.5);color:#555;box-shadow:0 4px 0 rgba(0,0,0,.08)}

/* BUBBLE */
.bubble-wrap{text-align:center;margin-bottom:14px;min-height:64px}
.bubble{display:inline-block;background:white;border-radius:20px;
  padding:11px 22px;font-size:1.15rem;font-weight:800;color:#1a1a1a;
  box-shadow:0 6px 24px rgba(0,0,0,.15);position:relative;animation:bobble .35s ease;max-width:92%}
.bubble::after{content:'';position:absolute;bottom:-13px;left:50%;transform:translateX(-50%);
  border:7px solid transparent;border-top-color:white}
@keyframes bobble{0%{transform:scale(.82);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

.section{display:none}.section.active{display:block}

/* ANIMAL CARDS */
.animal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.animal-card{background:white;border-radius:var(--radius-card);overflow:hidden;
  box-shadow:var(--shadow-card);cursor:pointer;transition:transform .15s,box-shadow .15s;user-select:none}
.animal-card:active{transform:scale(.92);box-shadow:0 4px 12px rgba(0,0,0,.14)}
.animal-card.pop{animation:cpop .38s ease forwards}
@keyframes cpop{0%{transform:scale(1)}35%{transform:scale(1.14) rotate(-2deg)}65%{transform:scale(.96) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
.animal-img-wrap{width:100%;aspect-ratio:1;overflow:hidden;background:#e8f4f0}
.animal-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.animal-card:active .animal-img-wrap img{transform:scale(1.1)}
.animal-info{padding:7px 8px 9px;text-align:center;background:white}
.animal-kaz{font-family:'Fredoka One',cursive;font-size:clamp(.9rem,2.8vw,1.1rem);color:#222}
.animal-sound{font-size:.72rem;color:#999;font-weight:700;margin-top:1px}

/* COLOR LEARN CARDS */
.color-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.color-card{border-radius:var(--radius-card);aspect-ratio:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  box-shadow:var(--shadow-card);transition:transform .15s,box-shadow .15s;user-select:none;padding:8px}
.color-card:active{transform:scale(.91)}
.color-card.pop{animation:cpop .38s ease}
.color-name{font-family:'Fredoka One',cursive;font-size:clamp(.95rem,3.5vw,1.3rem);
  text-align:center;line-height:1.2;text-shadow:0 2px 6px rgba(0,0,0,.22)}
.color-example{margin-top:7px;font-size:1.9rem;filter:drop-shadow(0 2px 4px rgba(0,0,0,.15))}

/* NUMBER CARDS */
.number-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.num-card{background:white;border-radius:16px;padding:9px 3px 7px;text-align:center;
  cursor:pointer;box-shadow:var(--shadow-card);transition:transform .15s;user-select:none}
.num-card:active{transform:scale(.9)}
.num-card.pop{animation:cpop .38s ease}
.num-big{font-family:'Fredoka One',cursive;font-size:clamp(1.55rem,4.5vw,2.1rem);line-height:1}
.num-dots{font-size:clamp(.5rem,1.8vw,.65rem);line-height:1.2;color:#666;min-height:20px;word-break:break-all;padding:2px 2px 0}
.num-kaz{font-size:clamp(.58rem,1.8vw,.72rem);color:#aaa;font-weight:700;margin-top:2px}

/* ══════════ MATCH GAME ══════════ */
.match-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.match-score{background:white;border-radius:16px;padding:7px 18px;
  font-family:'Fredoka One',cursive;font-size:1.05rem;color:#2d5a27;
  box-shadow:0 4px 14px rgba(0,0,0,.14)}
.match-restart{background:rgba(255,255,255,.7);border-radius:999px;border:none;
  padding:7px 16px;font-family:'Fredoka One',cursive;font-size:.9rem;
  cursor:pointer;color:#444;box-shadow:0 3px 0 rgba(0,0,0,.1)}
.match-restart:active{transform:scale(.95)}
.match-instr{text-align:center;font-size:.95rem;font-weight:800;
  color:white;text-shadow:1px 2px 0 rgba(0,0,0,.2);margin-bottom:14px;min-height:22px}

/* ZONES - 4 col */
.zones-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.zone{border-radius:16px;min-height:68px;border:3px solid;
  display:flex;align-items:center;justify-content:center;
  transition:all .22s;position:relative;cursor:pointer}
.zone.zhighlight{transform:scale(1.06);filter:brightness(1.08)}
.zone.zcorrect{animation:zpop .4s ease}
@keyframes zpop{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}
.zone-label{font-family:'Fredoka One',cursive;font-size:0rem;
  position:absolute;bottom:5px;left:0;right:0;text-align:center;
  text-shadow:0 1px 4px rgba(0,0,0,.3)}
.zone-circle{width:42px;height:42px;border-radius:50%;
  box-shadow:0 2px 8px rgba(0,0,0,.22);transition:all .3s}

/* MATCH CARDS - 4 col */
.mcards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mcard{border-radius:16px;min-height:68px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:var(--shadow-card);transition:transform .15s,box-shadow .15s,opacity .35s;
  user-select:none;padding:5px 3px;border:3px solid transparent;position:relative;overflow:hidden}
.mcard::after{content:'';position:absolute;inset:0;
  background:linear-gradient(160deg,rgba(255,255,255,.28) 0%,rgba(255,255,255,.04) 60%);
  pointer-events:none}
.mcard:active{transform:scale(.91)}
.mcard.msel{transform:scale(1.1);border-color:rgba(255,255,255,.85);
  box-shadow:0 12px 32px rgba(0,0,0,.28),0 0 0 4px rgba(255,255,255,.5)}
.mcard.mmatched{opacity:0;transform:scale(.45);pointer-events:none}
.mcard-lbl{font-family:'Fredoka One',cursive;font-size:.72rem;margin-top:3px;
  text-shadow:0 1px 4px rgba(0,0,0,.3)}
.mcard-icon{font-size:1.3rem;filter:drop-shadow(0 1px 3px rgba(0,0,0,.2))}

/* WIN */
.win-overlay{display:none;text-align:center;padding:2.5rem 1rem}
.win-emoji{font-size:80px;animation:bounce 1.1s ease-in-out infinite;display:block}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-16px) rotate(4deg)}}
.win-title{font-family:'Fredoka One',cursive;font-size:2.2rem;color:white;
  text-shadow:3px 4px 0 #2d7a20;margin:14px 0 6px}
.win-sub{font-size:1.05rem;color:rgba(255,255,255,.9);font-weight:700;margin-bottom:22px;text-shadow:1px 2px 0 rgba(0,0,0,.15)}
.win-btn{background:white;color:#2d5a27;border:none;border-radius:999px;
  padding:14px 40px;font-family:'Fredoka One',cursive;font-size:1.3rem;
  cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.16)}
.win-btn:active{transform:scale(.97)}

/* STARS */
.star-burst{position:fixed;pointer-events:none;z-index:9999;font-size:28px;animation:sfx .85s ease forwards}
@keyframes sfx{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:scale(1.7) translate(var(--tx),var(--ty))}}
.wrong-shake{animation:shake .32s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

.grass-footer{position:fixed;bottom:0;left:0;right:0;height:30px;
  background:linear-gradient(180deg,#5BBF6A,#3d9e4f);z-index:3;
  border-radius:60% 60% 0 0/22px 22px 0 0;
  box-shadow:0 -2px 12px rgba(0,0,0,.1)}
@media(max-width:400px){.animal-grid,.color-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="clouds">
  <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
</div>
<div class="sun">☀️</div>

<div class="wrapper">
  <div class="header">
    <h1>🌟 Балалар ойыны</h1>
    <p>Суретті бас — үйрен!</p>
  </div>

  <div class="mode-row">
    <button class="mode-btn am" id="mb-learn" onclick="switchMode('learn',this)">📚 Үйрену</button>
    <button class="mode-btn im" id="mb-match" onclick="switchMode('match',this)">🎨 Жұптастыру</button>
  </div>

  <!-- ══ LEARN ══ -->
  <div class="mode-panel active" id="mode-learn">
    <div class="tabs">
      <button class="tab animals" onclick="showSection('animals',this)">🐾 Жануарлар</button>
      <button class="tab colors inactive" onclick="showSection('clr',this)">🎨 Түстер</button>
      <button class="tab numbers inactive" onclick="showSection('nums',this)">🔢 Сандар</button>
    </div>
    <div class="bubble-wrap"><div class="bubble" id="bubble">Суретті бас! 👇</div></div>
    <div class="section active" id="animals"><div class="animal-grid" id="animal-grid"></div></div>
    <div class="section" id="clr"><div class="color-grid" id="color-grid"></div></div>
    <div class="section" id="nums"><div class="number-grid" id="number-grid"></div></div>
  </div>

  <!-- ══ MATCH ══ -->
  <div class="mode-panel" id="mode-match">
    <div id="match-game">
      <div class="match-topbar">
        <div class="match-score" id="mscore">Жұп: 0 / 12</div>
        <button class="match-restart" onclick="restartMatch()">↺ Жаңа ойын</button>
      </div>
      <div class="match-instr" id="minstr">Төменнен түс таңда! 👇</div>
      <div class="zones-grid" id="zones-grid"></div>
      <div class="mcards-grid" id="mcards-grid"></div>
    </div>
    <div class="win-overlay" id="win-overlay">
      <span class="win-emoji">🏆</span>
      <div class="win-title">Керемет!</div>
      <div class="win-sub">Барлық 12 түсті тапты! Сен чемпионсың!</div>
      <button class="win-btn" onclick="restartMatch()">▶ Тағы ойна!</button>
    </div>
  </div>
</div>

<div class="grass-footer"></div>

<script>
// ── SPEECH ────────────────────────────────────────────────────────────────
let kkVoice = null;
function initVoices(){
  const vs = window.speechSynthesis.getVoices();
  kkVoice = vs.find(v=>v.lang.startsWith('kk'))
           || vs.find(v=>v.name.includes('Aigul'))
           || vs.find(v=>v.lang.startsWith('ru'))
           || null;
}
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = initVoices;
  setTimeout(initVoices, 400);
}
function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='kk-KZ'; u.rate=0.82; u.pitch=1.05;
  if(kkVoice) u.voice=kkVoice;
  window.speechSynthesis.speak(u);
}
function speakSeq(a,b){ speak(a); setTimeout(()=>speak(b),950); }

// ── HELPERS ───────────────────────────────────────────────────────────────
function popEl(el){el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');el.addEventListener('animationend',()=>el.classList.remove('pop'),{once:true});}
function burst(cx,cy,n=5){
  for(let i=0;i<n;i++){
    const s=document.createElement('div');s.className='star-burst';
    s.textContent=['⭐','🌟','✨','💫','🎉','🌈'][Math.floor(Math.random()*6)];
    const angle=(i/n)*360+Math.random()*30,dist=55+Math.random()*55;
    s.style.setProperty('--tx',Math.cos(angle*Math.PI/180)*dist+'px');
    s.style.setProperty('--ty',Math.sin(angle*Math.PI/180)*dist+'px');
    s.style.left=(cx-14)+'px';s.style.top=(cy-14)+'px';
    document.body.appendChild(s);s.addEventListener('animationend',()=>s.remove());
  }
}
function burstEl(el,n=5){const r=el.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2,n);}
function setBubble(t){const b=document.getElementById('bubble');b.style.animation='none';b.offsetHeight;b.style.animation='';b.textContent=t;}

// ── MODE SWITCH ───────────────────────────────────────────────────────────
function switchMode(m,btn){
  document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('mode-'+m).classList.add('active');
  document.querySelectorAll('.mode-btn').forEach(b=>{b.classList.remove('am');b.classList.add('im')});
  btn.classList.add('am');btn.classList.remove('im');
}

// ══════ LEARN MODE ════════════════════════════════════════════════════════
const animals=[
  {kaz:'Мысық',  sound:'Мияу мияу',    soundShow:'Мияу-мияу!',  emoji:'🐱',photo:'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?w=400&q=80'},
  {kaz:'Ит',     sound:'Ав ав ав',      soundShow:'Ав-ав!',       emoji:'🐶',photo:'https://images.unsplash.com/photo-1587300003388-59208cc962cb?w=400&q=80'},
  {kaz:'Сиыр',   sound:'Мууу',       soundShow:'Мөөөөө!',      emoji:'🐄',photo:'https://images.unsplash.com/photo-1546445317-29f4545e9d53?w=400&q=80'},
  {kaz:'Қой',    sound:'Мааа',      soundShow:'Мәәәәәәәәә!',  emoji:'🐑',photo:'https://images.unsplash.com/photo-1484557985045-edf25e08da73?w=400&q=80'},
  {kaz:'Жылқы',  sound:'Ихааа',   soundShow:'Ихааа!',   emoji:'🐴',photo:'https://images.unsplash.com/photo-1553284965-83fd3e82fa5a?w=400&q=80'},
  {kaz:'Тауық',  sound:'Кукареку',      soundShow:'Кукареку!',emoji:'🐔',photo:'https://images.unsplash.com/photo-1548550023-2bdb3c5beed7?w=400&q=80'},
  ];
const learnColors=[
  {kaz:'Қызыл',       bg:'#E63946',text:'#fff',   ex:''},
  {kaz:'Көк',         bg:'#4A90D9',text:'#fff',   ex:''},
  {kaz:'Жасыл',       bg:'#4CAF50',text:'#fff',   ex:''},
  {kaz:'Сары',        bg:'#FFD600',text:'#5a4000',ex:''},
  {kaz:'Қызғылт',     bg:'#F06292',text:'#fff',   ex:''},
  {kaz:'Қара',        bg:'#333',   text:'#fff',   ex:''},
  {kaz:'Ақ',          bg:'#f0f0f0',text:'#555',   ex:''},
  {kaz:'Күлгін',      bg:'#9C27B0',text:'#fff',   ex:''},
  {kaz:'Қызғылт сары',bg:'#FF7043',text:'#fff',   ex:''},
];
const nums=[
  {n:1,kaz:'Бір',dots:'●'},{n:2,kaz:'Екі',dots:'●●'},{n:3,kaz:'Үш',dots:'●●●'},
  {n:4,kaz:'Төрт',dots:'●●●●'},{n:5,kaz:'Бес',dots:'●●●●●'},{n:6,kaz:'Алты',dots:'●●●●●●'},
  {n:7,kaz:'Жеті',dots:'●●●●●●●'},{n:8,kaz:'Сегіз',dots:'●●●●●●●●'},
  {n:9,kaz:'Тоғыз',dots:'●●●●●●●●●'},{n:10,kaz:'Он',dots:'●●●●●●●●●●'},
];
const nColors=['#FF6B6B','#FF9F43','#FFD93D','#6BCB77','#4ECDC4','#45B7D1','#A55EEA','#F06292','#26de81','#45aaf2'];

const ag=document.getElementById('animal-grid');
animals.forEach(a=>{
  const d=document.createElement('div');d.className='animal-card';
  d.innerHTML=`<div class="animal-img-wrap"><img src="${a.photo}" alt="${a.kaz}" loading="lazy"></div>
    <div class="animal-info"><div class="animal-kaz">${a.emoji} ${a.kaz}</div><div class="animal-sound">${a.soundShow}</div></div>`;
  d.addEventListener('click',()=>{popEl(d);burstEl(d);setBubble(`${a.emoji} ${a.kaz}! ${a.soundShow}`);speakSeq(a.kaz,a.sound);});
  ag.appendChild(d);
});
const cg=document.getElementById('color-grid');
learnColors.forEach(c=>{
  const d=document.createElement('div');d.className='color-card';d.style.background=c.bg;
  d.innerHTML=`<div class="color-name" style="color:${c.text}">${c.kaz}</div><div class="color-example">${c.ex}</div>`;
  d.addEventListener('click',()=>{popEl(d);burstEl(d);setBubble(`${c.ex} Бұл — ${c.kaz}!`);speak(c.kaz);});
  cg.appendChild(d);
});
const ng=document.getElementById('number-grid');
nums.forEach((n,i)=>{
  const d=document.createElement('div');d.className='num-card';d.style.borderTop=`4px solid ${nColors[i]}`;
  d.innerHTML=`<div class="num-big" style="color:${nColors[i]}">${n.n}</div>
    <div class="num-dots" style="color:${nColors[i]}">${n.dots}</div>
    <div class="num-kaz">${n.kaz}</div>`;
  d.addEventListener('click',()=>{popEl(d);burstEl(d);setBubble(`${n.n} — ${n.kaz}! ${'⭐'.repeat(Math.min(n.n,10))}`);speak(n.kaz);});
  ng.appendChild(d);
});
function showSection(name,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t=>{t.classList.remove('animals','colors','numbers');t.classList.add('inactive')});
  const map={animals:'animals',clr:'colors',nums:'numbers'};
  btn.classList.remove('inactive');btn.classList.add(map[name]||name);
  setBubble('Суретті бас! 👇');
}

// ══════ MATCH GAME ════════════════════════════════════════════════════════
const MC=[
  {id:'red',    kaz:'Қызыл',         hex:'#E63946',tc:'#fff',   ex:''},
  {id:'blue',   kaz:'Көк',           hex:'#3B82F6',tc:'#fff',   ex:''},
  {id:'green',  kaz:'Жасыл',         hex:'#22C55E',tc:'#fff',   ex:''},
  {id:'yellow', kaz:'Сары',          hex:'#EAB308',tc:'#fff',   ex:''},
  {id:'purple', kaz:'Күлгін',        hex:'#9C27B0',tc:'#fff',   ex:''},
  {id:'pink',   kaz:'Қызғылт',       hex:'#EC4899',tc:'#fff',   ex:''},
  {id:'brown',  kaz:'Қоңыр',         hex:'#92400E',tc:'#fff',   ex:''},
  {id:'black',  kaz:'Қара',          hex:'#000000',tc:'#fff',   ex:''},
  {id:'white',  kaz:'Ақ',   	     hex:'#ffffff',tc:'#fff',   ex:''},
];

let mSel=null, mMatched=0;
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}

function restartMatch(){
  mSel=null; mMatched=0;
  document.getElementById('match-game').style.display='block';
  document.getElementById('win-overlay').style.display='none';
  document.getElementById('mscore').textContent='Жұп: 0 / 12';
  document.getElementById('minstr').textContent='Төменнен түс таңда! 👇';
  buildZones(); buildMCards();
}

function buildZones(){
  const g=document.getElementById('zones-grid'); g.innerHTML='';
  shuffle(MC).forEach(c=>{
    const d=document.createElement('div');
    d.className='zone'; d.id='zone-'+c.id;
    // Visible tinted background + solid border
    d.style.background = hexToRgba(c.hex, 0.18);
    d.style.borderColor = hexToRgba(c.hex, 0.65);
    d.innerHTML=`<div class="zone-circle" id="zc-${c.id}" style="background:${c.hex};opacity:.55;box-shadow:0 2px 10px ${hexToRgba(c.hex,.5)}"></div>
      <div class="zone-label" style="color:${c.hex};filter:brightness(.7)">${c.kaz}</div>`;
    d.addEventListener('click',()=>onZoneClick(c.id,d));
    g.appendChild(d);
  });
}

function buildMCards(){
  const g=document.getElementById('mcards-grid'); g.innerHTML='';
  shuffle(MC).forEach(c=>{
    const d=document.createElement('div');
    d.className='mcard'; d.id='mcard-'+c.id;
    d.style.background=c.hex;
    d.style.boxShadow=`0 6px 18px ${hexToRgba(c.hex,.45)},0 2px 6px rgba(0,0,0,.15)`;
    d.innerHTML=`<div class="mcard-icon">${c.ex}</div><div class="mcard-lbl" style="color:${c.tc}">${c.kaz}</div>`;
    d.addEventListener('click',()=>onMCardClick(c.id,d));
    g.appendChild(d);
  });
}

function onMCardClick(id,el){
  if(el.classList.contains('mmatched')) return;
  document.querySelectorAll('.mcard.msel').forEach(c=>c.classList.remove('msel'));
  if(mSel===id){mSel=null;return;}
  mSel=id; el.classList.add('msel');
  speak(MC.find(c=>c.id===id).kaz);
  document.getElementById('minstr').textContent='Жоғарыдан жұбын таңда! 👆';
}

function onZoneClick(id,el){
  if(!mSel){document.getElementById('minstr').textContent='Алдымен төменнен түс таңда! 👇';return;}
  if(mSel===id) doMatch(id,el);
  else doWrong(el);
}

function doMatch(id,zoneEl){
  const col=MC.find(c=>c.id===id);
  const cardEl=document.getElementById('mcard-'+id);
  const zc=document.getElementById('zc-'+id);
  // Make zone fully opaque and bright
  zoneEl.classList.add('zcorrect');
  zoneEl.style.background=hexToRgba(col.hex,.35);
  zoneEl.style.borderColor=col.hex;
  zoneEl.style.borderWidth='3px';
  zoneEl.style.borderStyle='solid';
  zc.style.opacity='1';
  zc.style.transform='scale(1.15)';
  zc.style.boxShadow=`0 4px 16px ${hexToRgba(col.hex,.7)}`;
  cardEl.classList.add('mmatched');
  burstEl(cardEl,7);
  speak(col.kaz);
  mMatched++; mSel=null;
  document.getElementById('mscore').textContent=`Жұп: ${mMatched} / 12`;
  if(mMatched===12){
    setTimeout(()=>{
      document.getElementById('match-game').style.display='none';
      document.getElementById('win-overlay').style.display='block';
      for(let i=0;i<18;i++) setTimeout(()=>burst(80+Math.random()*(window.innerWidth-160),80+Math.random()*(window.innerHeight-160),4),i*90);
    },700);
  } else {
    document.getElementById('minstr').textContent=`✅ Дұрыс! (${mMatched}/12) Келесіні таңда!`;
  }
}

function doWrong(zoneEl){
  zoneEl.classList.remove('wrong-shake');void zoneEl.offsetWidth;zoneEl.classList.add('wrong-shake');
  zoneEl.addEventListener('animationend',()=>zoneEl.classList.remove('wrong-shake'),{once:true});
  document.getElementById('minstr').textContent='❌ Жоқ! Тағы көр!';
  setTimeout(()=>{
    document.querySelectorAll('.mcard.msel').forEach(c=>c.classList.remove('msel'));
    mSel=null;
    document.getElementById('minstr').textContent='Төменнен түс таңда! 👇';
  },550);
}

function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

restartMatch();
</script>
</body>
</html>
